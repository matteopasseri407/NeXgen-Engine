# ============================================================================
# MANIFEST CANONICO MCP  ·  Agent-OS (fonte unica di verità)
# ----------------------------------------------------------------------------
# Questo file descrive OGNI server MCP UNA volta sola, in forma astratta.
# Un generatore (mcp/render.py) lo traduce nei dialetti delle CLI (Claude,
# Codex, Antigravity, OpenCode) su ogni macchina. Si modifica QUI; il resto
# e' generato.
#
# REGOLE:
#  - Nessun segreto qui dentro. I token si referenziano per NOME di variabile
#    d'ambiente, mai col valore. I segreti vivono in env / 99-SECRETS.
#  - transport: "stdio" (processo locale) | "http" (server remoto con bearer).
#  - targets: quali CLI montano questo server.
#  - Condizionalita': i server marcati `require_env` sono inclusi solo se
#    l'utente ha impostato la relativa variabile d'ambiente. In questo modo
#    una installazione Local-Only non carica MCP che puntano a backend
#    assenti. L'utente configura l'architettura in 99-INDEX/USER-PROFILE.md
#    e imposta le env var coerenti. Il renderer deve omettere i server il cui
#    `require_env` non e' soddisfatto.
# ============================================================================

servers:

  # ---- spina dorsale (presente in ogni CLI, sempre) ------------------------

  playwright:
    transport: stdio
    command: npx
    args: ["-y", "@playwright/mcp@latest", "--cdp-endpoint", "http://localhost:9222"]
    targets: [claude, codex, antigravity, opencode]

  # ---- backend self-hosted (solo modalita' Cloud-Server) --------------------
  # Le porte derivano dalle env var impostate dall'utente; default sensati
  # allineati a 03-INFRA/deploy/*.yml. Se la env var non c'e', il renderer
  # omette il server (require_env).

  firecrawl:
    transport: stdio
    command: npx
    args: ["-y", "firecrawl-mcp"]
    env:
      FIRECRAWL_API_URL: "http://127.0.0.1:${FIRECRAWL_TUNNEL_PORT:-33002}"
    require_env: FIRECRAWL_TUNNEL_PORT
    targets: [claude, codex, antigravity, opencode]

  n8n-mcp:
    transport: http
    url: "http://127.0.0.1:${N8N_TUNNEL_PORT:-5678}/mcp-server/http"
    auth: { type: bearer, env: N8N_MCP_TOKEN }
    require_env: N8N_MCP_TOKEN
    timeouts: { startup: 120, tool: 600 }          # usati solo da Codex
    targets: [claude, codex, antigravity, opencode]

  vault-library:
    transport: http
    url: "${VAULT_LIBRARY_URL}"
    url_env: VAULT_LIBRARY_URL                      # OpenCode parametrizza la url via env
    auth: { type: bearer, env: VAULT_LIBRARY_TOKEN }
    require_env: VAULT_LIBRARY_URL
    timeouts: { startup: 120, tool: 120 }
    targets: [claude, codex, antigravity, opencode]

  vault-ocr:
    transport: stdio
    command: python3
    args: ["${KNOWLEDGE_VAULT_PATH}/03-INFRA/deploy/ocr/mcp/vault_ocr_mcp.py"]
    env:
      VAULT_OCR_API_URL: "http://127.0.0.1:${OCR_TUNNEL_PORT:-33003}"
    require_env: OCR_TUNNEL_PORT
    timeouts: { startup: 30, tool: 120 }           # tool 120s: RapidOCR su VPS 1.5 CPU puo' superare il default 30s
    targets: [claude, codex, antigravity, opencode]
    windows:
      command: python
      args: ["${KNOWLEDGE_VAULT_PATH}\\03-INFRA\\deploy\\ocr\\mcp\\vault_ocr_mcp.py"]
      env:
        VAULT_OCR_API_URL: "http://127.0.0.1:${OCR_TUNNEL_PORT:-33003}"

  # ---- extra per-CLI (opzionali, non bloccanti) ----------------------------

  filesystem:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "${HOME}"]
    targets: [codex]

  memory:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]
    targets: [codex]
