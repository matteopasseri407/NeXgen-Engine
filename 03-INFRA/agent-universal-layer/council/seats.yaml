# Piano dati utente (non motore pubblico): seat disponibili per il Consiglio.
# In A5 questo file va spostato fuori dal motore, nel piano dati personale.
# Per ora resta qui come seat di sviluppo/test dell'MVP A1.
#
# zero_retention, fonte primaria https://opencode.ai/docs/zen/#privacy (2026-07-09):
#   true  = OpenCode ha zero-retention agreement col provider, niente training. Vale
#           per TUTTI i modelli a pagamento del piano opencode-go (GLM, Qwen, DeepSeek
#           Pro, Kimi, MiniMax inclusi).
#   false = ECCEZIONE dichiarata: "durante il periodo gratuito, i dati raccolti possono
#           essere usati per migliorare il modello". Solo per test tecnici con contenuto
#           non sensibile (es. "quanto fa 7*8"), MAI per brief reali di brainstorm/review.
seats:
  deepseek-free:
    vendor: deepseek
    cli: opencode
    model: opencode/deepseek-v4-flash-free
    zero_retention: false
  mimo-free:
    vendor: xiaomi
    cli: opencode
    model: opencode/mimo-v2.5-free
    zero_retention: false
  # Seat di produzione (piano opencode-go, zero-retention garantito), quota
  # esaurita fino al reset del 2026-07-14: da riattivare allora.
  glm:
    vendor: zhipu
    cli: opencode
    model: opencode-go/glm-5.2
    zero_retention: true
  qwen:
    vendor: alibaba
    cli: opencode
    model: opencode-go/qwen3.6-plus
    zero_retention: true
