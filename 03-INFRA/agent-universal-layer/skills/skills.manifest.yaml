# ============================================================================
# CANONICAL SKILL MANIFEST  ·  Agent-OS (single source of truth)
# ----------------------------------------------------------------------------
# Lists EVERY "chosen" skill of the agent-layer exactly once. skills-sync.py
# materializes it in the ~/.agents/skills hub and hooks it into the runtimes
# (Claude, Codex) on EVERY machine. You choose HERE; everything else is synced.
#
# "Choose a skill once -> it's everywhere" workflow:
#   1. add an entry below
#   2. git commit + push
#   3. on every machine: git pull && python3 03-INFRA/scripts/skills-sync.py --apply
#
# RULES (mirrors the MCP manifest):
#   - origin: vault   -> vendored in the vault (UL/skills/<name>); git carries
#                        it everywhere. For skills the user owns or modifies.
#   - origin: github  -> third-party, NOT vendored: only INVENTORIED here,
#                        the bytes get reinstalled from upstream with `skills add <repo>`.
#                        (follows the vault rule: third-party = restorable)
#   - targets: which runtimes mount the skill. The ~/.agents hub is always
#              populated; runtimes hook into it (Claude via a whole-folder
#              symlink, Codex via a per-skill symlink).
#   - credit: for third-party skills, credit to the original author is always
#             given in this manifest and in CREDITS.md at the repo root.
#
# NOTE: this manifest is ADDITIVE, not authoritative for deletion.
#       skills-sync never removes a skill absent from the manifest.
# ============================================================================

skills:

  # default writing style for every agent (see AGENTS.md > Operating Style).
  # Third-party: blader/humanizer (https://github.com/blader/humanizer).
  # A skill that strips AI-generated-text "tells". Credit: blader.
  humanizer:
    origin: github
    repo: blader/humanizer
    credit: "blader (https://github.com/blader/humanizer)"
    targets: [claude, codex]

  # custom skill: already vendored in the vault, git syncs it.
  knowledge-vault-hygiene:
    origin: vault
    targets: [claude, codex]

  # distinctive UI/frontend design; vendored in the vault.
  # Origin: Claude Code official skill (Anthropic).
  frontend-design:
    origin: vault
    credit: "Anthropic (Claude Code official skill)"
    targets: [claude, codex]
