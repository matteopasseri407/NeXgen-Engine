services:
  vault-ocr-api:
    build: ./api
    image: vault-ocr-api:latest
    container_name: vault-ocr-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3033:3033"
    environment:
      VAULT_OCR_MAX_BYTES: "15728640"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    cpus: "1.50"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3033/health', timeout=4).read()"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
